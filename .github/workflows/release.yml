name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Upload darwin tarballs for pkg job
        uses: actions/upload-artifact@v4
        with:
          name: darwin-tarballs
          path: |
            dist/*darwin_x86_64.tar.gz
            dist/*darwin_arm64.tar.gz
          if-no-files-found: error
          retention-days: 1

  # macOS installer .pkg — runs alongside the main release, doesn't block it.
  # Signs + notarizes iff the corresponding secrets exist, otherwise emits
  # unsigned pkgs (usable via MDM InstallApplication, which skips Gatekeeper).
  pkg:
    name: macos-pkg
    needs: goreleaser
    runs-on: macos-14
    # pkg failures must never red-check a release where tar.gz + brew already
    # succeeded. The release tag still carries the full goreleaser artifacts;
    # pkg is additive.
    continue-on-error: true
    # Only non-sensitive presence flags live at job level so step-level `if:`
    # expressions can read them. Actual secret values are passed into only
    # the specific steps that need them.
    env:
      HAS_MACOS_CERTS: ${{ secrets.MACOS_APP_CERT_P12 != '' && secrets.MACOS_INSTALLER_CERT_P12 != '' }}
      HAS_NOTARIZE_KEYS: ${{ secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download darwin tarballs
        uses: actions/download-artifact@v4
        with:
          name: darwin-tarballs
          path: dist/

      - name: Import Developer ID certificates (if present)
        if: env.HAS_MACOS_CERTS == 'true'
        env:
          MACOS_APP_CERT_P12: ${{ secrets.MACOS_APP_CERT_P12 }}
          MACOS_APP_CERT_PASSWORD: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          MACOS_INSTALLER_CERT_P12: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
          MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          set -eu
          KEYCHAIN=release.keychain
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"

          echo "$MACOS_APP_CERT_P12" | base64 --decode > app.p12
          echo "$MACOS_INSTALLER_CERT_P12" | base64 --decode > installer.p12

          security import app.p12 -k "$KEYCHAIN" \
            -P "$MACOS_APP_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security import installer.p12 -k "$KEYCHAIN" \
            -P "$MACOS_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          rm -f app.p12 installer.p12

          APP_ID=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')
          INSTALLER_ID=$(security find-identity -v "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Installer/{print $2; exit}')

          [ -n "$APP_ID" ] || { echo "No Developer ID Application found" >&2; exit 1; }
          [ -n "$INSTALLER_ID" ] || { echo "No Developer ID Installer found" >&2; exit 1; }

          echo "MACOS_APP_IDENTITY=$APP_ID" >> "$GITHUB_ENV"
          echo "MACOS_INSTALLER_IDENTITY=$INSTALLER_ID" >> "$GITHUB_ENV"
          echo "imported: $APP_ID / $INSTALLER_ID"

      # Notarization is only meaningful on a signed installer — Apple's notary
      # service rejects unsigned pkgs. Gate it on HAS_MACOS_CERTS as well.
      - name: Set up notarytool keychain profile (if present)
        if: env.HAS_MACOS_CERTS == 'true' && env.HAS_NOTARIZE_KEYS == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -eu
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_P8" > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool store-credentials cowork-mdm-notarize \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID"

          echo "NOTARIZE_KEYCHAIN_PROFILE=cowork-mdm-notarize" >> "$GITHUB_ENV"

      - name: Build pkgs
        run: |
          set -eu
          mkdir -p pkg-out
          FULL_VERSION="${{ needs.goreleaser.outputs.version }}"
          # pkgbuild --version expects a numeric dotted CFBundleVersion, not
          # a SemVer prerelease. Strip any "-rc.1" / "-beta.2" suffix for the
          # pkg metadata; the release filename keeps the full version.
          PKG_VERSION="${FULL_VERSION%%-*}"

          for arch in x86_64 arm64; do
            tarball=$(ls dist/*_darwin_${arch}.tar.gz 2>/dev/null | head -n1)
            if [ -z "$tarball" ]; then
              echo "missing tarball for darwin/${arch}" >&2
              exit 1
            fi
            ./pkg/build-pkg.sh "$tarball" "$arch" "$PKG_VERSION" "$FULL_VERSION" pkg-out
          done

          ls -la pkg-out/

      - name: Attach pkgs to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" pkg-out/*.pkg --clobber
