version: 2

project_name: cowork-mdm

before:
  hooks:
    - go mod tidy

builds:
  - id: cowork-mdm
    main: ./cmd/cowork-mdm
    binary: cowork-mdm
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  github:
    owner: krislavten
    name: cowork-mdm
  footer: |
    ---

    **Not affiliated with Anthropic.** This project is an independent tool built on
    public reverse-engineering of the Claude Desktop application.

brews:
  - name: cowork-mdm
    repository:
      owner: krislavten
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/krislavten/cowork-mdm
    description: |
      Claude Desktop enterprise deployment toolkit — MDM config profiles,
      plugin marketplace management, and per-host diagnostics.
    license: MIT
    test: |
      system "#{bin}/cowork-mdm --version"
    install: |
      bin.install "cowork-mdm"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
